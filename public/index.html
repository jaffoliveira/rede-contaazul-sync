<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede → Conta Azul Sync</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
        header { background: #1a56db; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; }
    .auth-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .auth-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 8px; }
    .auth-item .store-name { font-weight: 600; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge.ok { background: #d1fae5; color: #065f46; }
        .badge.nok { background: #fee2e2; color: #991b1b; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #1a56db; color: white; }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn-success { background: #059669; color: white; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: #374151; }
    select, input[type=file] { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; }
    .drop-zone { border: 2px dashed #d1d5db; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: border-color .2s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #1a56db; background: #eff6ff; }
        .drop-zone p { color: #6b7280; font-size: 0.9rem; }
    .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }
    .actions { display: flex; gap: 10px; margin-top: 16px; }
    #previewSection { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #f9fafb; text-align: left; padding: 10px 12px; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; }
          td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; }
    tr:hover td { background: #f9fafb; }
        .status-ok { color: #059669; font-weight: 600; }
    .status-err { color: #dc2626; font-weight: 600; }
          #resultsSection { display: none; }
          .summary { display: flex; gap: 16px; margin-bottom: 16px; }
    .summary-item { flex: 1; padding: 16px; border-radius: 8px; text-align: center; }
    .summary-item .value { font-size: 2rem; font-weight: 700; }
    .summary-item .label { font-size: 0.8rem; color: #6b7280; margin-top: 4px; }
    .s-total { background: #eff6ff; color: #1d4ed8; }
          .s-ok { background: #d1fae5; color: #065f46; }
          .s-err { background: #fee2e2; color: #991b1b; }
          .loading { display: none; text-align: center; padding: 24px; color: #6b7280; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #1a56db; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.875rem; }
    .alert-info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
          .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
          .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        </style>
      </head>
      <body>
        <header>
          <span style="font-size:1.5rem">🔄</span>
          <h1>Rede → Conta Azul Sync</h1>
        </header>

        <div class="container">
          <!-- Auth Status -->
          <div class="card">
            <h2>Status de Autenticação</h2>
            <div class="auth-grid" id="authGrid">
              <div class="auth-item"><span class="store-name">SIDE</span><div><span class="badge nok" id="auth-SIDE">Não autenticado</span><button class="btn btn-primary btn-sm" style="margin-left:8px" onclick="loginStore('SIDE')">Login</button></div></div>
              <div class="auth-item"><span class="store-name">ZONE</span><div><span class="badge nok" id="auth-ZONE">Não autenticado</span><button class="btn btn-primary btn-sm" style="margin-left:8px" onclick="loginStore('ZONE')">Login</button></div></div>
              <div class="auth-item"><span class="store-name">PLACE</span><div><span class="badge nok" id="auth-PLACE">Não autenticado</span><button class="btn btn-primary btn-sm" style="margin-left:8px" onclick="loginStore('PLACE')">Login</button></div></div>
              <div class="auth-item"><span class="store-name">STATION</span><div><span class="badge nok" id="auth-STATION">Não autenticado</span><button class="btn btn-primary btn-sm" style="margin-left:8px" onclick="loginStore('STATION')">Login</button></div></div>
            </div>
          </div>

          <!-- Upload -->
          <div class="card">
            <h2>Importar Vendas</h2>
            <div class="form-group">
              <label for="storeSelect">Loja</label>
              <select id="storeSelect">
                <option value="">Selecione a loja...</option>
                <option value="SIDE">SIDE</option>
                <option value="ZONE">ZONE</option>
                <option value="PLACE">PLACE</option>
                <option value="STATION">STATION</option>
              </select>
            </div>
            <div class="form-group">
              <label>Arquivo Excel (.xlsx)</label>
              <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📊</div>
                <p id="dropText">Arraste o arquivo aqui ou clique para selecionar</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
              </div>
            </div>
            <div class="actions">
              <button class="btn btn-secondary" onclick="previewFile()" id="btnPreview" disabled>👁 Visualizar</button>
              <button class="btn btn-success" onclick="importFile()" id="btnImport" disabled>⬆️ Importar para Conta Azul</button>
            </div>
          </div>

          <!-- Preview -->
          <div class="card" id="previewSection">
            <h2>Pré-visualização</h2>
            <div id="alertBox"></div>
            <div id="previewTable"></div>
          </div>

          <!-- Loading -->
          <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <p id="loadingText">Importando vendas...</p>
          </div>

          <!-- Results -->
          <div class="card" id="resultsSection">
            <h2>Resultado da Importação</h2>
            <div class="summary" id="summaryBox"></div>
            <div id="resultsTable"></div>
          </div>
        </div>

        <script>
          let selectedFile = null;

          // Check auth status on load
          window.addEventListener('DOMContentLoaded', () => {
                  checkAuthStatus();
      const params = new URLSearchParams(location.search);
      if (params.get('auth') === 'success') {
        const store = params.get('store');
        showAlert(`✅ ${store} autenticado com sucesso!`, 'success');
        history.replaceState({}, '', '/');
          }
             });

    async function checkAuthStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        Object.entries(data).forEach(([store, info]) => {
                    const badge = document.getElementById('auth-' + store);
                    if (badge) {
            badge.textContent = info.authenticated ? 'Autenticado ✓' : 'Não autenticado';
            badge.className = 'badge ' + (info.authenticated ? 'ok' : 'nok');
                    }
      });
    } catch(e) { console.warn('Erro ao checar auth:', e); }
             }

    function loginStore(store) {
            window.location.href = '/api/auth/login/' + store;
    }

    function handleFile(file) {
            if (!file) return;
      selectedFile = file;
      document.getElementById('dropText').textContent = `📎 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
      document.getElementById('btnPreview').disabled = false;
      document.getElementById('btnImport').disabled = false;
    }

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
            e.preventDefault(); dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
});

    async function previewFile() {
      if (!selectedFile) return;
      const fd = new FormData();
      fd.append('file', selectedFile);
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('alertBox').innerHTML = '';
              document.getElementById('previewTable').innerHTML = '<p style="color:#6b7280;text-align:center;padding:16px">Carregando...</p>';
      try {
        const res = await fetch('/api/upload/preview', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        renderPreviewTable(data.sales);
      } catch(e) {
        document.getElementById('previewTable').innerHTML = '';
                  showAlert('Erro: ' + e.message, 'error');
      }
    }

    function renderPreviewTable(sales) {
            if (!sales.length) { document.getElementById('previewTable').innerHTML = '<p style="text-align:center;color:#6b7280;padding:16px">Nenhuma venda encontrada no arquivo.</p>'; return; }
      const html = `
        <p style="margin-bottom:12px;color:#6b7280">${sales.length} venda(s) encontrada(s)</p>
              <div style="overflow-x:auto">
              <table>
                <thead><tr><th>Data</th><th>Bandeira</th><th>Modalidade</th><th>Canal</th><th>Valor</th><th>MDR</th><th>Líquido</th><th>Descrição</th></tr></thead>
                <tbody>
                  ${sales.map(s => {
                    const net = (s.value - s.value * s.mdrRate / 100).toFixed(2);
              return `<tr>
                      <td>${s.date}</td>
                      <td>${s.brandDisplay}</td>
                      <td>${s.modality}</td>
                      <td>${s.channel}</td>
                      <td>R$ ${s.value.toFixed(2).replace('.',',')}</td>
                      <td>${s.mdrRate}%</td>
                      <td>R$ ${parseFloat(net).toFixed(2).replace('.',',')}</td>
                      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${s.description}">${s.description}</td>
                    </tr>`;
}).join('')}
                </tbody>
              </table></div>`;
      document.getElementById('previewTable').innerHTML = html;
}

    async function importFile() {
      const store = document.getElementById('storeSelect').value;
      if (!store) { showAlert('Selecione uma loja antes de importar.', 'error'); return; }
      if (!selectedFile) { showAlert('Selecione um arquivo.', 'error'); return; }
      if (!confirm(`Confirma a importação para ${store} no Conta Azul?`)) return;

      document.getElementById('loadingSection').style.display = 'block';
      document.getElementById('resultsSection').style.display = 'none';
      document.getElementById('loadingText').textContent = 'Importando vendas para ' + store + '...';

      const fd = new FormData();
      fd.append('file', selectedFile);
      fd.append('store', store);

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        document.getElementById('loadingSection').style.display = 'none';
        if (!res.ok) {
          showAlert('Erro: ' + data.error, 'error');
          return;
        }
        renderResults(data);
      } catch(e) {
        document.getElementById('loadingSection').style.display = 'none';
        showAlert('Erro de rede: ' + e.message, 'error');
      }
    }

    function renderResults(data) {
            document.getElementById('resultsSection').style.display = 'block';
      const ok = data.results.filter(r => r.success).length;
      const err = data.results.filter(r => !r.success).length;
      document.getElementById('summaryBox').innerHTML = `
                <div class="summary-item s-total"><div class="value">${data.total}</div><div class="label">Total</div></div>
                <div class="summary-item s-ok"><div class="value">${ok}</div><div class="label">Importadas</div></div>
                <div class="summary-item s-err"><div class="value">${err}</div><div class="label">Com erro</div></div>`;
      const rows = data.results.map(r => `<tr>
        <td>${r.sale.date}</td>
        <td>${r.sale.brandDisplay}</td>
        <td>${r.sale.modality}</td>
        <td>R$ ${r.sale.value.toFixed(2).replace('.',',')}</td>
        <td>${r.sale.mdrRate}%</td>
        <td class="${r.success ? 'status-ok' : 'status-err'}">${r.success ? '✅ OK - ID: ' + r.id : '❌ ' + r.error}</td>
      </tr>`).join('');
      document.getElementById('resultsTable').innerHTML = `
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Data</th><th>Bandeira</th><th>Modalidade</th><th>Valor</th><th>MDR</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
      document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
}

    function showAlert(msg, type) {
      const alertBox = document.getElementById('alertBox');
      if (alertBox) alertBox.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : type === 'success' ? 'success' : 'info'}">${msg}</div>`;
}

    setInterval(checkAuthStatus, 30000);
  </script>
</body>
</html>
